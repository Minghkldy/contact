<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ဗမာစာလုံး Font ထည့်သွင်းခြင်း */
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            /* Background ကို အကြည်ရောင် ပိုဆန်စေရန် rgba တန်ဖိုးကို ညှိထားပါသည် */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://raw.githubusercontent.com/Minghkldy/contact/main/12a347e1265d4747d0c574fb3bddacbb.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding: 20px 0; 
        }

        .container {
            width: 95%;
            max-width: 480px; 
            min-height: 90vh; 
            padding: 40px 20px;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .logo-section {
            margin-bottom: 25px;
        }

        .logo-section img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            margin-bottom: 18px;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #f1f1f1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .welcome-text {
            color: #ffd700;
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 30px;
            padding: 0 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0 25px;
            min-height: 60px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border-color: #ffd700;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
        }

        .link-card i, .link-card span:first-child {
            width: 40px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 16px;
            font-weight: bold; 
            margin-right: 40px; 
        }

        .fa-facebook-messenger { color: #0084ff; }
        .fa-viber { color: #7360f2; }
        .fa-telegram { color: #0088cc; }
        .fa-line { color: #00c300; }
        .fa-bullhorn { color: #ffcc00; }

        @media (min-width: 768px) {
            .container {
                padding: 60px 40px;
            }
            .logo-section img {
                width: 140px;
                height: 140px;
            }
            h1 {
                font-size: 32px;
            }
            .link-card {
                padding: 0 35px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://your-watermark-logo.png" class="watermark" alt="">

    <div class="logo-section">
        <img src="https://via.placeholder.com/150/ffd700/000000?text=LOGO" alt="Logo">
        <h1>MM</h1>
        <p class="welcome-text">ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့ မှာ ကံထူးပါ</p>
    </div>

    <div class="links-container">
        <a href="YOUR_GAME_LINK" class="link-card">
            <span>🎰</span>
            <span class="link-text">ဂိမ်းကစားရန်</span>
        </a>

        <a href="https://m.me/YOUR_PAGE_ID" class="link-card">
            <i class="fab fa-facebook-messenger"></i>
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="viber://chat?number=YOUR_PHONE_NUMBER" class="link-card">
            <i class="fab fa-viber"></i>
            <span class="link-text">Viber ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_USERNAME" class="link-card">
            <i class="fab fa-telegram"></i>
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://line.me/ti/p/~YOUR_ID" class="link-card">
            <i class="fab fa-line"></i>
            <span class="link-text">LINE ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_CHANNEL" class="link-card">
            <i class="fas fa-bullhorn"></i>
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>
</div>

</body>
</html>
