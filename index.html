<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* နောက်ခံ Background ပုံထည့်ရန် */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://raw.githubusercontent.com/BLLTZ/king9mm/main/background.jpg'); /* သင့် Background ပုံ Link ထည့်ပါ */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        /* အလယ်က Logo ရေစာ (Watermark) */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            opacity: 0.1;
            z-index: -1;
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .welcome-text {
            font-size: 13px;
            color: #f1f1f1;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .icon-box {
            width: 35px;
            display: flex;
            justify-content: center;
        }

        .icon-box img {
            width: 28px;
            height: 28px;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
        }

        /* အောက်ခြေ Banner */
        .bottom-banner {
            margin-top: 30px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .bottom-banner img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="your-watermark-logo.png" class="watermark" alt="">

    <div class="logo-section">
        <img src="your-logo.png" alt="KING9 MM">
        <h1>KING9 MM</h1>
        <p class="welcome-text">🥰 ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့  မှာ ကံထူးပါ 🥰</p>
    </div>

    <div class="links-container">
        <a href="#" class="link-card">
            <span class="icon-box">🎰</span>
            <span class="link-text">ဂိမ်းကစားရန်</span>
        </a>

        <a href="#" class="link-card">
            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt=""></span>
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card">
            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/5/5d/Viber_logo_2018.svg" alt=""></span>
            <span class="link-text">Viber ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card">
            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt=""></span>
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card">
            <span class="icon-box"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt=""></span>
            <span class="link-text">LINE ဆက်သွယ်ရန်</span>
        </a>

        <a href="#" class="link-card">
            <span class="icon-box">📢</span>
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>

    <div class="bottom-banner">
        <img src="your-bottom-banner.png" alt="Promotion Banner">
    </div>
</div>

</body>
</html>
