<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', sans-serif;
        }

        body {
            /* ၁။ Background ပုံအတွက် ပြင်ထားသောအပိုင်း - Blur ကို ဖယ်ရှားလိုက်ပါသည် */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://raw.githubusercontent.com/Minghkldy/contact/main/image.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            /* backdrop-filter: blur(10px); <- ဤအပိုင်းကို ဖြုတ်လိုက်ပါသည် */
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            /* အလယ်က အကြည်ရောင် Panel အကျိုးသက်ရောက်မှု */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* ၂။ အလယ်က Logo ရေစာ (Watermark) အတွက် ကုဒ်အသစ် */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        .logo-section img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #f1f1f1;
        }

        .welcome-text {
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 12px 25px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            position: relative;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.03);
            border-color: #ffd700;
        }

        .link-card i, .link-card img {
            width: 30px;
            font-size: 24px;
            margin-right: 15px;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        /* ၃။ အောက်ခြေ Banner ပုံအတွက် ကုဒ်အသစ် */
        .bottom-banner {
            margin-top: 30px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
        }

        .bottom-banner img {
            width: 100%;
            display: block;
        }

        /* Brand Colors for Icons */
        .fa-facebook-messenger { color: #0084ff; }
        .fa-viber { color: #7360f2; }
        .fa-telegram { color: #0088cc; }
        .fa-line { color: #00c300; }
        .fa-slot { color: #ffcc00; }

    </style>
</head>
<body>

<div class="container">
    <img src="https://your-watermark-logo.png" class="watermark" alt="">

    <div class="logo-section">
        <img src="https://via.placeholder.com/150" alt="Logo">
        <h1>MM</h1>
        <p class="welcome-text">🥰 ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့ မှာ ကံထူးပါ 🥰</p>
    </div>

    <div class="links-container">
        <a href="YOUR_GAME_LINK" class="link-card">
            <span style="font-size: 24px;">🎰</span>
            <span class="link-text">ဂိမ်းကစားရန်</span>
        </a>

        <a href="https://m.me/YOUR_PAGE_ID" class="link-card">
            <i class="fab fa-facebook-messenger"></i>
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="viber://chat?number=YOUR_PHONE_NUMBER" class="link-card">
            <i class="fab fa-viber"></i>
            <span class="link-text">Viber ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_USERNAME" class="link-card">
            <i class="fab fa-telegram"></i>
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://line.me/ti/p/~YOUR_ID" class="link-card">
            <i class="fab fa-line"></i>
            <span class="link-text">LINE ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_CHANNEL" class="link-card">
            <i class="fas fa-bullhorn"></i>
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>
</div>

</body>
</html>
