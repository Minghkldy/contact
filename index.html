<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ဗမာစာလုံး Font ထည့်သွင်းခြင်း */
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://raw.githubusercontent.com/Minghkldy/contact/main/12a347e1265d4747d0c574fb3bddacbb.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding: 15px; 
            perspective: 1000px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            min-height: auto; 
            padding: 30px 20px;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-section {
            margin-bottom: 25px;
        }

        /* Logo Floating Animation - အပေါ်အောက် လှုပ်ရှားမှု */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            /* အဝါရောင်မှ Cyan Blue & Silver Gradient သို့ ပြောင်းလဲခြင်း */
            border: 4px solid #00f2ff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            margin-bottom: 18px;
            /* Animation ထည့်သွင်းခြင်း */
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            /* စာသားကို Silver White ရောင်ပြေးပြောင်းခြင်း */
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 2px 2px 4px rgba(0,0,0,0.5);
        }

        .welcome-text {
            /* Welcome Text ကို Cyan Blue အရောင်ပြောင်းခြင်း */
            color: #00f2ff;
            font-size: 16px; 
            font-weight: bold; 
            margin-bottom: 30px;
            padding: 0 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            line-height: 1.5;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 0 25px;
            min-height: 55px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            transform-style: preserve-3d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.15);
            /* Hover Border ကိုလည်း Cyan Blue ပြောင်းထားသည် */
            border-color: #00f2ff;
            transform: translateZ(30px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .link-card i, .link-card span:first-child {
            width: 35px;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            transform: translateZ(20px);
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: bold; 
            margin-right: 35px; 
            transform: translateZ(10px);
        }

        /* Brand Colors */
        .fa-facebook-messenger { color: #0084ff; }
        .fa-viber { color: #7360f2; }
        .fa-telegram { color: #0088cc; }
        .fa-line { color: #00c300; }
        .fa-bullhorn { color: #ffcc00; }

        @media (min-width: 768px) {
            .container {
                max-width: 480px;
                padding: 40px;
            }
            .logo-section img {
                width: 120px;
                height: 120px;
            }
            h1 { font-size: 28px; }
            .welcome-text { font-size: 18px; }
            .link-card { min-height: 60px; }
            .link-text { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <img src="https://img.freepik.com/premium-vector/casino-logo-king-9-vector-illustration_7109-114.jpg" alt="Logo">
        <h1>KING9 MM</h1>
        <p class="welcome-text">🥰 ပျော်ရွှင်မှုတွေနေ့တိုင်းရှာ အနိုင်ရဖို့ မှာ ကံထူးပါ 🥰</p>
    </div>

    <div class="links-container">
        <a href="YOUR_GAME_LINK" class="link-card">
            <span>🎰</span>
            <span class="link-text">ဂိမ်းကစားရန်</span>
        </a>

        <a href="https://m.me/YOUR_PAGE_ID" class="link-card">
            <i class="fab fa-facebook-messenger"></i>
            <span class="link-text">Facebook Messenger ဆက်သွယ်ရန်</span>
        </a>

        <a href="viber://chat?number=YOUR_PHONE_NUMBER" class="link-card">
            <i class="fab fa-viber"></i>
            <span class="link-text">Viber ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_USERNAME" class="link-card">
            <i class="fab fa-telegram"></i>
            <span class="link-text">Telegram ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://line.me/ti/p/~YOUR_ID" class="link-card">
            <i class="fab fa-line"></i>
            <span class="link-text">LINE ဆက်သွယ်ရန်</span>
        </a>

        <a href="https://t.me/YOUR_CHANNEL" class="link-card">
            <i class="fas fa-bullhorn"></i>
            <span class="link-text">Telegram Tip Game Channel</span>
        </a>
    </div>
</div>

</body>
</html>
